services:
  - type: web
    name: crophealth-ai
    env: python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: USE_SQLITE
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
